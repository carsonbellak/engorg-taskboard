<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pinout Reference</title>
<style>
  :root { color-scheme: light dark;
    --bg:#f4f6f8; --panel:#fff; --bd:#e2e8f0; --tx:#1e293b; --mut:#64748b; --hover:#eef2f7; --board:#1f6f43; }
  @media (prefers-color-scheme: dark) {
    :root { --bg:#1e2228; --panel:#262b33; --bd:#3a414b; --tx:#e6e9ee; --mut:#9aa3ad; --hover:#2f3540; --board:#15663c; }
  }
  * { box-sizing:border-box; }
  body { margin:0; font-family:"Segoe UI",system-ui,Arial,sans-serif; background:var(--bg); color:var(--tx); }
  .wrap { display:flex; height:100vh; }
  .side { width:210px; flex-shrink:0; border-right:1px solid var(--bd); overflow-y:auto; padding:12px 8px; background:var(--panel); }
  .side h1 { font-size:14px; margin:4px 8px 12px; }
  .board-btn { display:block; width:100%; text-align:left; padding:9px 10px; margin-bottom:4px; border:1px solid transparent;
    border-radius:8px; background:transparent; color:var(--tx); cursor:pointer; font-size:13px; }
  .board-btn:hover { background:var(--hover); }
  .board-btn.active { background:var(--hover); border-color:var(--bd); font-weight:700; }
  .main { flex:1; overflow:auto; padding:18px 22px; }
  h2 { font-size:20px; margin:0; }
  .note { font-size:12px; color:var(--mut); margin:5px 0 12px; max-width:820px; }
  .toolbar { display:flex; gap:12px; align-items:center; margin-bottom:12px; flex-wrap:wrap; }
  input[type=search]{ padding:7px 10px; border:1px solid var(--bd); border-radius:8px; background:var(--panel); color:var(--tx); font-size:13px; min-width:220px; }
  .legend { display:flex; flex-wrap:wrap; gap:5px 12px; font-size:11px; color:var(--mut); }
  .legend span { display:inline-flex; align-items:center; gap:5px; }
  .ldot { width:11px; height:11px; border-radius:3px; display:inline-block; }
  .stage { background:var(--panel); border:1px solid var(--bd); border-radius:12px; padding:14px; overflow:auto; }
  svg { width:100%; height:auto; display:block; }
  .pg { cursor:pointer; }
  .pg text { font-family:ui-monospace,Consolas,monospace; }
  .pg .nm { font-weight:700; font-size:12px; fill:var(--tx); }
  .pg .sb { font-size:10px; fill:var(--mut); }
  .pg .num { font-size:9px; fill:var(--mut); }
  .pg.hide { opacity:.12; }
  .pg.sel .dot { stroke:var(--tx); stroke-width:2.5; }
  .pg.sel .nm { text-decoration:underline; }
  .board-rect { fill:var(--board); }
  .silk { fill:none; stroke:rgba(255,255,255,.25); }
  .silktx { fill:rgba(255,255,255,.7); font-size:11px; font-family:ui-monospace,Consolas,monospace; }
  .deco { fill:#9aa3ad; }
  .detail { margin-top:12px; font-size:13px; color:var(--mut); min-height:20px; }
  .detail b { color:var(--tx); }
  .foot { font-size:11px; color:var(--mut); margin-top:10px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="side"><h1>🔌 Pinouts</h1><div id="boardlist"></div></div>
  <div class="main">
    <h2 id="title"></h2>
    <div class="note" id="note"></div>
    <div class="toolbar"><input type="search" id="search" placeholder="Filter pins (SDA, GPIO18, PWM…)"><div class="legend" id="legend"></div></div>
    <div class="stage"><div id="view"></div></div>
    <div class="detail" id="detail">Click a pin for details.</div>
    <div class="foot">Simplified vector layouts (not photos) — pin order matches the named board variant; always verify orientation against your board's silkscreen / datasheet.</div>
  </div>
</div>

<script>
const CATS = {
  power:["Power","#e74c3c"], gnd:["Ground","#6b7280"], gpio:["GPIO / Digital","#27ae60"],
  analog:["Analog / ADC","#8e44ad"], uart:["UART","#2980b9"], i2c:["I²C","#e67e22"],
  spi:["SPI","#16a085"], pwm:["PWM","#d63384"], ctrl:["Control","#f59e0b"], other:["Other","#7f8c8d"]
};
const col = c => (CATS[c]||CATS.other)[1];
const p = (n,s,c)=>({n,s:s||"",c:c||"other"});

const BOARDS = {
  "raspberry-pi": { name:"Raspberry Pi (40-pin J8)", w:640, h:560,
    note:"Standard 40-pin GPIO header (Pi 2/3/4/5/Zero). BCM numbering. 3.3V logic — never put 5V on a GPIO. Pin 1 (3V3) is top-left, marked on the board.",
    body:{x:250,y:24,w:140,h:512,label:"40-PIN HEADER"},
    header:{kind:"dual", x:280, y:54, gap:80, pitch:24, num:true, pins:[
      p("3V3","","power"),p("5V","","power"),
      p("GPIO2","SDA1","i2c"),p("5V","","power"),
      p("GPIO3","SCL1","i2c"),p("GND","","gnd"),
      p("GPIO4","GPCLK0","gpio"),p("GPIO14","TXD0","uart"),
      p("GND","","gnd"),p("GPIO15","RXD0","uart"),
      p("GPIO17","","gpio"),p("GPIO18","PWM0","pwm"),
      p("GPIO27","","gpio"),p("GND","","gnd"),
      p("GPIO22","","gpio"),p("GPIO23","","gpio"),
      p("3V3","","power"),p("GPIO24","","gpio"),
      p("GPIO10","MOSI","spi"),p("GND","","gnd"),
      p("GPIO9","MISO","spi"),p("GPIO25","","gpio"),
      p("GPIO11","SCLK","spi"),p("GPIO8","CE0","spi"),
      p("GND","","gnd"),p("GPIO7","CE1","spi"),
      p("GPIO0","ID_SD","i2c"),p("GPIO1","ID_SC","i2c"),
      p("GPIO5","","gpio"),p("GND","","gnd"),
      p("GPIO6","","gpio"),p("GPIO12","PWM0","pwm"),
      p("GPIO13","PWM1","pwm"),p("GND","","gnd"),
      p("GPIO19","PCM_FS","gpio"),p("GPIO16","","gpio"),
      p("GPIO26","","gpio"),p("GPIO20","","gpio"),
      p("GND","","gnd"),p("GPIO21","","gpio")
    ]}},

  "arduino-uno": { name:"Arduino Uno R3", w:760, h:420,
    note:"ATmega328P, 5V logic. Viewed with the USB/power jacks on the left. Top edge = digital header (~ = PWM), bottom edge = power + analog. UART D0/D1, I²C A4/A5, SPI D10–D13, LED D13.",
    body:{x:70,y:150,w:620,h:150,label:"ARDUINO UNO"},
    deco:[{x:34,y:175,w:46,h:42},{x:40,y:235,w:40,h:40}],
    headers:[
      {kind:"h", x:110, y:150, pitch:31, dir:"up", pins:[
        p("SCL","","i2c"),p("SDA","","i2c"),p("AREF","","ctrl"),p("GND","","gnd"),
        p("D13","SCK·LED","spi"),p("D12","MISO","spi"),p("D11","~MOSI","pwm"),p("D10","~SS","pwm"),
        p("D9","~","pwm"),p("D8","","gpio"),p("D7","","gpio"),p("D6","~","pwm"),
        p("D5","~","pwm"),p("D4","","gpio"),p("D3","~INT1","pwm"),p("D2","INT0","gpio"),
        p("D1","TX","uart"),p("D0","RX","uart")]},
      {kind:"h", x:150, y:300, pitch:34, dir:"down", pins:[
        p("IOREF","","ctrl"),p("RESET","","ctrl"),p("3V3","","power"),p("5V","","power"),
        p("GND","","gnd"),p("GND","","gnd"),p("VIN","","power"),
        p("A0","ADC","analog"),p("A1","ADC","analog"),p("A2","ADC","analog"),
        p("A3","ADC","analog"),p("A4","SDA","i2c"),p("A5","SCL","analog")]}
    ]},

  "esp32-devkit": { name:"ESP32 DevKit V1 (DOIT, 30-pin)", w:660, h:560,
    note:"3.3V logic, USB at the bottom. This is the common DOIT/HiLetgo 30-pin DevKit order — 36/38-pin modules differ, so verify against your board. ⚠ GPIO6–11 are flash (omitted). GPIO34–39 input-only. Strapping: 0,2,5,12,15.",
    body:{x:250,y:30,w:160,h:470,label:"ESP32",usb:"bottom"},
    headers:[
      {kind:"v", x:250, y:60, pitch:30, dir:"left", pins:[
        p("EN","reset","ctrl"),p("GPIO36","VP·ADC1_0·in","analog"),p("GPIO39","VN·ADC1_3·in","analog"),
        p("GPIO34","ADC1_6·in","analog"),p("GPIO35","ADC1_7·in","analog"),p("GPIO32","ADC1_4·touch","analog"),
        p("GPIO33","ADC1_5·touch","analog"),p("GPIO25","DAC1","analog"),p("GPIO26","DAC2","analog"),
        p("GPIO27","touch7","gpio"),p("GPIO14","touch6","gpio"),p("GPIO12","strap·touch5","ctrl"),
        p("GPIO13","touch4","gpio"),p("GND","","gnd"),p("VIN","5V in","power")]},
      {kind:"v", x:410, y:60, pitch:30, dir:"right", pins:[
        p("GPIO23","MOSI","spi"),p("GPIO22","SCL","i2c"),p("GPIO1","TX0","uart"),p("GPIO3","RX0","uart"),
        p("GPIO21","SDA","i2c"),p("GPIO19","MISO","spi"),p("GPIO18","SCK","spi"),p("GPIO5","CS·strap","spi"),
        p("GPIO17","TX2","uart"),p("GPIO16","RX2","uart"),p("GPIO4","ADC2·touch0","gpio"),
        p("GPIO0","strap·boot","ctrl"),p("GPIO2","LED·strap","ctrl"),p("GPIO15","strap","gpio"),p("3V3","","power")]}
    ]},

  "esp8266-nodemcu": { name:"ESP8266 NodeMCU (Amica)", w:640, h:560,
    note:"3.3V logic, USB at the bottom. Dx silkscreen → GPIO. Avoid SD/CLK pins (flash). GPIO0/2/15 are boot-strapping. One ADC (A0).",
    body:{x:240,y:30,w:160,h:470,label:"NodeMCU",usb:"bottom"},
    headers:[
      {kind:"v", x:240, y:60, pitch:30, dir:"left", pins:[
        p("A0","ADC0","analog"),p("RSV","reserved","other"),p("RSV","reserved","other"),
        p("SD3","GPIO10","other"),p("SD2","GPIO9","other"),p("SD1","flash","other"),
        p("CMD","flash","other"),p("SD0","flash","other"),p("CLK","flash","other"),
        p("GND","","gnd"),p("3V3","","power"),p("EN","enable","ctrl"),
        p("RST","reset","ctrl"),p("GND","","gnd"),p("VIN","5V in","power")]},
      {kind:"v", x:400, y:60, pitch:30, dir:"right", pins:[
        p("D0","GPIO16","gpio"),p("D1","GPIO5·SCL","i2c"),p("D2","GPIO4·SDA","i2c"),
        p("D3","GPIO0·strap","ctrl"),p("D4","GPIO2·LED","ctrl"),p("3V3","","power"),
        p("GND","","gnd"),p("D5","GPIO14·SCK","spi"),p("D6","GPIO12·MISO","spi"),
        p("D7","GPIO13·MOSI","spi"),p("D8","GPIO15·CS","ctrl"),p("RX","GPIO3","uart"),
        p("TX","GPIO1","uart"),p("GND","","gnd"),p("3V3","","power")]}
    ]},

  "ftdi-232": { name:"FTDI Basic / FT232 (6-pin)", w:540, h:340,
    note:"The standard 6-pin serial header (SparkFun FTDI Basic, Pro Mini programmers). Pin 1 = GND (square pad). Set the VCC jumper to 3V3 or 5V to match the target. TX→target RX, RX←target TX.",
    body:{x:150,y:70,w:150,h:200,label:"FTDI",usb:"left"},
    headers:[{kind:"v", x:300, y:100, pitch:30, dir:"right", num:true, pins:[
      p("GND","ground","gnd"),p("CTS","clear-to-send","ctrl"),p("VCC","3V3 / 5V","power"),
      p("TXO","→ target RX","uart"),p("RXI","← target TX","uart"),p("DTR","reset","ctrl")]}]},

  "msp430-launchpad": { name:"TI MSP430G2 LaunchPad", w:660, h:560,
    note:"MSP-EXP430G2 with MSP430G2553 (J1 left / J2 right, 10 pins each). 3.6V max. Functions are multiplexed — verify against the G2553 datasheet. LEDs: P1.0 red, P1.6 green. Button: P1.3. Emulator/USB at top.",
    body:{x:250,y:30,w:160,h:470,label:"LaunchPad",usb:"top"},
    headers:[
      {kind:"v", x:250, y:70, pitch:42, dir:"left", pins:[
        p("VCC","3.3V","power"),p("P1.0","A0·red LED","gpio"),p("P1.1","UART RXD","uart"),
        p("P1.2","UART TXD","uart"),p("P1.3","button·A3","ctrl"),p("P1.4","A4·SMCLK","analog"),
        p("P1.5","A5·SCLK","spi"),p("P2.0","TA1.0","gpio"),p("P2.1","TA1.1","gpio"),p("P2.2","TA1.1","gpio")]},
      {kind:"v", x:410, y:70, pitch:42, dir:"right", pins:[
        p("GND","","gnd"),p("P2.6","XIN·TA0.1","gpio"),p("P2.7","XOUT","gpio"),p("TEST","SBWTCK","ctrl"),
        p("RST","SBWTDIO","ctrl"),p("P1.7","SDA·MOSI","i2c"),p("P1.6","SCL·MISO·green","i2c"),
        p("P2.5","TA1.2","gpio"),p("P2.4","TA1.2","gpio"),p("P2.3","TA1.0","gpio")]}
    ]}
};

let current = "raspberry-pi", query = "";
let pinSeq = 0;
const pinData = {};   // id -> {n,s,c}

function legend(){ document.getElementById("legend").innerHTML = Object.values(CATS)
  .map(v=>`<span><span class="ldot" style="background:${v[1]}"></span>${v[0]}</span>`).join(""); }
function boardList(){
  document.getElementById("boardlist").innerHTML = Object.entries(BOARDS)
    .map(([id,b])=>`<button class="board-btn ${id===current?'active':''}" data-id="${id}">${b.name}</button>`).join("");
  document.querySelectorAll(".board-btn").forEach(b=>b.addEventListener("click",()=>{current=b.dataset.id;query="";document.getElementById("search").value="";document.getElementById("detail").textContent="Click a pin for details.";render();}));
}

const escx = s => (s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;");

// one pin: dot + label, returns svg string; registers pinData
function pinSVG(pin, x, y, dir, num){
  const id = "p"+(pinSeq++);
  pinData[id] = pin; pinData[id].cat = pin.c;
  const c = col(pin.c);
  let label="", lead="", numt="";
  const off = 14, txo = 22;
  if (dir==="left"){
    lead=`<line x1="${x-6}" y1="${y}" x2="${x-off}" y2="${y}" stroke="${c}" stroke-width="2"/>`;
    label=`<text x="${x-txo}" y="${y}" text-anchor="end" dominant-baseline="middle"><tspan class="nm">${escx(pin.n)}</tspan>${pin.s?`<tspan class="sb" dx="6">${escx(pin.s)}</tspan>`:""}</text>`;
  } else if (dir==="right"){
    lead=`<line x1="${x+6}" y1="${y}" x2="${x+off}" y2="${y}" stroke="${c}" stroke-width="2"/>`;
    label=`<text x="${x+txo}" y="${y}" text-anchor="start" dominant-baseline="middle"><tspan class="nm">${escx(pin.n)}</tspan>${pin.s?`<tspan class="sb" dx="6">${escx(pin.s)}</tspan>`:""}</text>`;
  } else if (dir==="up"){
    lead=`<line x1="${x}" y1="${y-6}" x2="${x}" y2="${y-off}" stroke="${c}" stroke-width="2"/>`;
    label=`<g transform="translate(${x},${y-txo}) rotate(-90)"><text x="0" y="0" text-anchor="start" dominant-baseline="middle"><tspan class="nm">${escx(pin.n)}</tspan>${pin.s?`<tspan class="sb" dx="6">${escx(pin.s)}</tspan>`:""}</text></g>`;
  } else { // down
    lead=`<line x1="${x}" y1="${y+6}" x2="${x}" y2="${y+off}" stroke="${c}" stroke-width="2"/>`;
    label=`<g transform="translate(${x},${y+txo}) rotate(90)"><text x="0" y="0" text-anchor="start" dominant-baseline="middle"><tspan class="nm">${escx(pin.n)}</tspan>${pin.s?`<tspan class="sb" dx="6">${escx(pin.s)}</tspan>`:""}</text></g>`;
  }
  if (num) numt=`<text class="num" x="${x}" y="${y-9}" text-anchor="middle">${num}</text>`;
  return `<g class="pg" data-id="${id}" data-s="${escx((pin.n+" "+pin.s).toLowerCase())}">
    ${lead}<circle class="dot" cx="${x}" cy="${y}" r="6" fill="${c}"/>${numt}${label}</g>`;
}

function header(h){
  let s="";
  if (h.kind==="dual"){
    const xl=h.x, xr=h.x+h.gap;
    for (let i=0;i<h.pins.length;i+=2){
      const y=h.y+(i/2)*h.pitch;
      s+=pinSVG(h.pins[i], xl, y, "left", h.num?i+1:0);
      if (h.pins[i+1]) s+=pinSVG(h.pins[i+1], xr, y, "right", h.num?i+2:0);
    }
  } else if (h.kind==="v"){
    h.pins.forEach((pn,i)=>{ s+=pinSVG(pn, h.x, h.y+i*h.pitch, h.dir, h.num?i+1:0); });
  } else { // h
    h.pins.forEach((pn,i)=>{ s+=pinSVG(pn, h.x+i*h.pitch, h.y, h.dir, h.num?i+1:0); });
  }
  return s;
}

function render(){
  const b = BOARDS[current];
  pinSeq=0; for (const k in pinData) delete pinData[k];
  document.getElementById("title").textContent=b.name;
  document.getElementById("note").textContent=b.note||"";
  document.querySelectorAll(".board-btn").forEach(x=>x.classList.toggle("active",x.dataset.id===current));

  let body="";
  if (b.body){
    const bd=b.body;
    body+=`<rect class="board-rect" x="${bd.x}" y="${bd.y}" width="${bd.w}" height="${bd.h}" rx="10"/>`;
    body+=`<text class="silktx" x="${bd.x+bd.w/2}" y="${bd.y+bd.h/2}" text-anchor="middle" transform="rotate(90 ${bd.x+bd.w/2} ${bd.y+bd.h/2})">${escx(bd.label||"")}</text>`;
    if (bd.usb==="bottom") body+=`<rect class="deco" x="${bd.x+bd.w/2-18}" y="${bd.y+bd.h-6}" width="36" height="16" rx="2"/>`;
    if (bd.usb==="top") body+=`<rect class="deco" x="${bd.x+bd.w/2-18}" y="${bd.y-10}" width="36" height="16" rx="2"/>`;
    if (bd.usb==="left") body+=`<rect class="deco" x="${bd.x-12}" y="${bd.y+bd.h/2-12}" width="18" height="24" rx="2"/>`;
  }
  (b.deco||[]).forEach(d=>{ body+=`<rect class="deco" x="${d.x}" y="${d.y}" width="${d.w}" height="${d.h}" rx="3"/>`; });

  let pins="";
  if (b.header) pins+=header(b.header);
  (b.headers||[]).forEach(h=>pins+=header(h));

  document.getElementById("view").innerHTML =
    `<svg viewBox="0 0 ${b.w} ${b.h}" style="max-width:${b.w}px">${body}${pins}</svg>`;
  attach();
  applyFilter();
}

function attach(){
  document.querySelectorAll(".pg").forEach(g=>{
    g.addEventListener("click",()=>{
      document.querySelectorAll(".pg.sel").forEach(x=>x.classList.remove("sel"));
      g.classList.add("sel");
      const d=pinData[g.dataset.id];
      document.getElementById("detail").innerHTML =
        `<b>${escx(d.n)}</b>${d.s?" — "+escx(d.s):""} · <span style="color:${col(d.cat)}">${(CATS[d.cat]||CATS.other)[0]}</span>`;
    });
  });
}
function applyFilter(){
  document.querySelectorAll(".pg").forEach(g=>{
    g.classList.toggle("hide", !!query && !g.dataset.s.includes(query));
  });
}
document.getElementById("search").addEventListener("input",e=>{query=e.target.value.trim().toLowerCase();applyFilter();});
legend(); boardList(); render();
</script>
</body>
</html>
