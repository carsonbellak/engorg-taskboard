name: Build & Release Installer

# Builds EngOrg-Setup.exe with Inno Setup and publishes it:
#   • on every push to main  → the rolling "latest" GitHub Release (version 1.0.<run>)
#   • on every v* tag push   → that version's GitHub Release (e.g. v1.1.0), stamped
#                              with the real semver and attached as an asset.
# The large bundled runtimes (nodejs/ + tools/) are not in the repo — they're
# restored from the one-time "build-deps" prerelease asset and cached between runs.
#
# After each build the "Prune old version releases" step keeps only the newest
# vX.Y.Z release and deletes the rest (+their tags), so the Releases page stays
# tidy. The functional "latest" (in-app updater source) and "build-deps" (CI
# runtimes) releases are never touched.

on:
  push:
    branches: [main]
    tags: ['v*']
    paths-ignore:
      - '**.md'
  workflow_dispatch:

concurrency:
  # Keep main-push and tag builds in separate groups so they don't cancel each other.
  group: release-installer-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version & release target
        shell: bash
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            VER="${GITHUB_REF_NAME#v}"                 # v1.1.0 -> 1.1.0
            echo "APP_VERSION=$VER"            >> "$GITHUB_ENV"
            echo "APP_VERSION_FULL=$VER"       >> "$GITHUB_ENV"
            echo "RELEASE_TAG=$GITHUB_REF_NAME">> "$GITHUB_ENV"
            echo "IS_TAG=true"                 >> "$GITHUB_ENV"
          else
            echo "APP_VERSION=1.0.${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"
            echo "APP_VERSION_FULL="                    >> "$GITHUB_ENV"
            echo "RELEASE_TAG=latest"                   >> "$GITHUB_ENV"
            echo "IS_TAG=false"                         >> "$GITHUB_ENV"
          fi

      - name: Restore bundled runtimes (nodejs + tools)
        id: deps
        uses: actions/cache@v4
        with:
          path: |
            nodejs
            tools
          # Bump this suffix whenever the build-deps archive is re-uploaded.
          key: engorg-deps-v1

      - name: Download build-deps if not cached
        if: steps.deps.outputs.cache-hit != 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download build-deps -R "$GITHUB_REPOSITORY" -p deps.tar.gz
          tar -xzf deps.tar.gz
          rm -f deps.tar.gz
          test -f nodejs/npm.cmd && test -d tools || { echo "deps layout looks wrong"; exit 1; }

      - name: Install Inno Setup
        shell: bash
        run: choco install innosetup -y --no-progress

      - name: Build installer
        shell: pwsh   # PowerShell passes the /D switches verbatim (bash/MSYS mangles them)
        run: |
          Write-Host "Building EngOrg v$env:APP_VERSION"
          $iscc = @("/DBuildNumber=$env:GITHUB_RUN_NUMBER")
          if ($env:APP_VERSION_FULL) { $iscc += "/DAppVersionFull=$env:APP_VERSION_FULL" }
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" @iscc "installer.iss"
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed ($LASTEXITCODE)" }
          Get-Item EngOrg-Setup.exe | Select-Object Name, Length

      - name: Publish release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REPO="$GITHUB_REPOSITORY"
          if [ "$IS_TAG" = "true" ]; then
            # Attach to the version's release (create it if it doesn't exist yet).
            NOTES="EngOrg v$APP_VERSION — automated installer build for $RELEASE_TAG."
            if ! gh release view "$RELEASE_TAG" -R "$REPO" >/dev/null 2>&1; then
              gh release create "$RELEASE_TAG" -R "$REPO" --verify-tag --title "v$APP_VERSION" --notes "$NOTES"
            fi
            gh release upload "$RELEASE_TAG" EngOrg-Setup.exe -R "$REPO" --clobber
          else
            # Rolling "latest" release.
            NOTES="EngOrg v$APP_VERSION — automated build from commit ${GITHUB_SHA} ($(date -u +%Y-%m-%dT%H:%MZ))."
            if ! gh release view latest -R "$REPO" >/dev/null 2>&1; then
              gh release create latest -R "$REPO" --title "EngOrg v$APP_VERSION (latest build)" --notes "$NOTES" --latest
            fi
            gh release upload latest EngOrg-Setup.exe -R "$REPO" --clobber
            gh release edit latest -R "$REPO" --title "EngOrg v$APP_VERSION (latest build)" --notes "$NOTES"
            # Move the rolling "latest" tag to this commit so the release page shows
            # it as current (not "N commits since this release").
            gh api -X PATCH "repos/$REPO/git/refs/tags/latest" -f sha="$GITHUB_SHA" -F force=true >/dev/null || true
          fi

      - name: Prune old version releases
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REPO="$GITHUB_REPOSITORY"
          # Every semver version release (vX.Y.Z). Keep the newest, delete the rest
          # (and their tags). "latest" and "build-deps" don't match, so they stay.
          ALL=$(gh release list -R "$REPO" --limit 200 --json tagName --jq '.[].tagName' \
                | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' || true)
          if [ -z "$ALL" ]; then echo "No version releases to prune."; exit 0; fi
          KEEP=$(printf '%s\n' "$ALL" | sort -V | tail -1)
          echo "Keeping newest version release: $KEEP"
          for TAG in $ALL; do
            [ "$TAG" = "$KEEP" ] && continue
            echo "Deleting old release $TAG"
            gh release delete "$TAG" -R "$REPO" --cleanup-tag --yes || echo "  (could not delete $TAG, continuing)"
          done
