<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — EngOrg</title>
  <style>
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0F172A; color: #F1F5F9;
      display: flex; align-items: center; justify-content: center;
      height: 100vh; margin: 0;
    }
    .container { text-align: center; padding: 40px; }
    .title { font-size: 20px; font-weight: 700; margin-bottom: 24px; }
    .status { font-size: 14px; color: #94A3B8; margin-top: 16px; }
    .error { color: #EF4444; }
    .spinner {
      width: 32px; height: 32px; border: 3px solid #334155;
      border-top-color: #818CF8; border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 16px auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <div class="title">Signing in with Google...</div>
    <div class="spinner" id="spinner"></div>
    <div class="status" id="status">Opening Google sign-in...</div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyA0PSZdBoVrNUrDR384m8O5PcMcbDrGGSw",
      authDomain: "assistant-taskboard.firebaseapp.com",
      projectId: "assistant-taskboard"
    });

    const auth = firebase.auth();
    const status = document.getElementById('status');

    async function doSignIn() {
      try {
        const provider = new firebase.auth.GoogleAuthProvider();
        // Force fresh sign-in to get OAuth tokens
        await auth.signOut();
        const result = await auth.signInWithPopup(provider);

        // Extract the Google OAuth access token from the credential
        const credential = result.credential;
        const accessToken = credential.accessToken || '';

        status.textContent = 'Success! You can close this window.';
        document.getElementById('spinner').style.display = 'none';

        // Pass the access token to Electron
        window.location.hash = '#auth_success=access_token&access_token=' + encodeURIComponent(accessToken);
      } catch (err) {
        status.innerHTML = '<span class="error">Sign-in failed: ' + err.message + '</span>';
        document.getElementById('spinner').style.display = 'none';
      }
    }

    doSignIn();
  </script>
</body>
</html>
